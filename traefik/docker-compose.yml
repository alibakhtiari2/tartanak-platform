# Traefik — runs ONCE per server, handles SSL for ALL instances automatically.
# Start with: docker compose -f /opt/tartanak/traefik/docker-compose.yml up -d
#
# NOTE: Docker provider is disabled due to a Docker API version mismatch between
# Traefik v3.x (uses API 1.24) and Docker Engine 29+ (minimum API 1.40).
# Routes are defined statically in ./dynamic/routes.yml instead (file provider).

services:
  traefik:
    image: traefik:v3.3
    container_name: tartanak-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tartanak-traefik-certs:/certs
      - /opt/tartanak/traefik/dynamic:/dynamic:ro
    command:
      # File provider (replaces Docker provider — avoids API version mismatch on Docker 29+)
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS redirect
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@tartanak.com}
      - --certificatesresolvers.le.acme.storage=/certs/acme.json
      # WebSocket support
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=86400s
    networks:
      - tartanak-web
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "3" }

networks:
  tartanak-web:
    external: true

volumes:
  tartanak-traefik-certs:
